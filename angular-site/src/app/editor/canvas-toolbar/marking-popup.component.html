<div class="pointer-events-auto absolute left-3 right-[17px] top-3 z-50 rounded-lg border border-[var(--border)] bg-[var(--surface)] shadow-[0_8px_32px_rgba(0,0,0,0.7)]">
  <div class="flex min-h-[40px] items-center justify-between border-b border-[var(--border)] px-3.5 py-2">
    <span class="text-[0.88rem] font-bold text-[var(--on-surface)]">Generate Road Markings</span>
    <button type="button" mat-icon-button class="!m-0 !flex !h-7 !min-h-7 !w-7 !min-w-7 !items-center !justify-center !p-0" (click)="close.emit()">
      <mat-icon class="!h-4 !w-4 !text-base">close</mat-icon>
    </button>
  </div>
  <div class="flex px-2.5 pb-1 pt-2">
    <button type="button"
      class="flex flex-1 items-center justify-center gap-1 border px-2.5 py-1.5 text-[0.78rem] transition first:rounded-l-md last:rounded-r-md [&+button]:border-l-0"
      [class.border-[var(--accent)]]="markingTab === 'side'"
      [class.bg-[color:rgba(229,57,53,0.14)]]="markingTab === 'side'"
      [class.text-[var(--accent-light)]]="markingTab === 'side'"
      [class.border-[var(--border)]]="markingTab !== 'side'"
      [class.bg-[var(--bg)]]="markingTab !== 'side'"
      [class.text-[var(--muted)]]="markingTab !== 'side'"
      (click)="onTabChange('side')">
      <mat-icon class="!h-3.5 !w-3.5 !text-[14px]">border_outer</mat-icon> Side Marks
    </button>
    <button type="button"
      class="flex flex-1 items-center justify-center gap-1 border px-2.5 py-1.5 text-[0.78rem] transition first:rounded-l-md last:rounded-r-md [&+button]:border-l-0"
      [class.border-[var(--accent)]]="markingTab === 'dash'"
      [class.bg-[color:rgba(229,57,53,0.14)]]="markingTab === 'dash'"
      [class.text-[var(--accent-light)]]="markingTab === 'dash'"
      [class.border-[var(--border)]]="markingTab !== 'dash'"
      [class.bg-[var(--bg)]]="markingTab !== 'dash'"
      [class.text-[var(--muted)]]="markingTab !== 'dash'"
      (click)="onTabChange('dash')">
      <mat-icon class="!h-3.5 !w-3.5 !text-[14px]">linear_scale</mat-icon> Centre Dashes
    </button>
    <button type="button"
      class="flex flex-1 items-center justify-center gap-1 border px-2.5 py-1.5 text-[0.78rem] transition first:rounded-l-md last:rounded-r-md [&+button]:border-l-0"
      [class.border-[var(--accent)]]="markingTab === 'remove'"
      [class.bg-[color:rgba(229,57,53,0.14)]]="markingTab === 'remove'"
      [class.text-[var(--accent-light)]]="markingTab === 'remove'"
      [class.border-[var(--border)]]="markingTab !== 'remove'"
      [class.bg-[var(--bg)]]="markingTab !== 'remove'"
      [class.text-[var(--muted)]]="markingTab !== 'remove'"
      (click)="onTabChange('remove')">
      <mat-icon class="!h-3.5 !w-3.5 !text-[14px]">delete_sweep</mat-icon> Remove Marks
    </button>
  </div>
  @if (markingTab === 'side') {
    <form [formGroup]="sideForm">
      <div class="flex gap-4 px-2.5 pb-0.5 pt-1.5">
        <label class="inline-flex cursor-pointer items-center gap-1.5 text-[0.82rem] text-[var(--on-surface)]">
          <input type="checkbox" formControlName="combined" /> Combined
        </label>
        <label class="inline-flex cursor-pointer items-center gap-1.5 text-[0.82rem] text-[var(--on-surface)]">
          <input type="checkbox" formControlName="left" /> Left
        </label>
        <label class="inline-flex cursor-pointer items-center gap-1.5 text-[0.82rem] text-[var(--on-surface)]">
          <input type="checkbox" formControlName="right" /> Right
        </label>
      </div>
      <div class="grid grid-cols-2 gap-1.5 px-2.5 pb-1 pt-2">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y start</mat-label>
          <input matInput type="number" formControlName="yStart" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y end</mat-label>
          <input matInput type="number" formControlName="yEnd" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Inset</mat-label>
          <input matInput type="number" formControlName="inset" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y frequency</mat-label>
          <input matInput type="number" min="1" formControlName="yFrequency" />
        </mat-form-field>
      </div>
    </form>
  } @else if (markingTab === 'dash') {
    <form [formGroup]="centreForm">
      <div class="flex gap-4 px-2.5 pb-0.5 pt-1.5">
        <label class="inline-flex cursor-pointer items-center gap-1.5 text-[0.82rem] text-[var(--on-surface)]">
          <input type="checkbox" formControlName="combined" /> Combined
        </label>
        <label class="inline-flex cursor-pointer items-center gap-1.5 text-[0.82rem] text-[var(--on-surface)]">
          <input type="checkbox" formControlName="left" /> Left
        </label>
        <label class="inline-flex cursor-pointer items-center gap-1.5 text-[0.82rem] text-[var(--on-surface)]">
          <input type="checkbox" formControlName="right" /> Right
        </label>
      </div>
      <div class="grid grid-cols-2 gap-1.5 px-2.5 pb-1 pt-2">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y start</mat-label>
          <input matInput type="number" formControlName="yStart" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y end</mat-label>
          <input matInput type="number" formControlName="yEnd" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Dash length</mat-label>
          <input matInput type="number" min="1" formControlName="dashLength" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Gap length</mat-label>
          <input matInput type="number" min="1" formControlName="gapLength" />
        </mat-form-field>
      </div>
    </form>
  } @else {
    <form [formGroup]="removeForm">
      <div class="grid grid-cols-2 gap-1.5 px-2.5 pb-1 pt-2">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y start</mat-label>
          <input matInput type="number" formControlName="yStart" />
        </mat-form-field>
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full text-[0.82rem]">
          <mat-label>Y end</mat-label>
          <input matInput type="number" formControlName="yEnd" />
        </mat-form-field>
      </div>
      <p class="mx-2.5 mb-0 text-[0.72rem] text-[var(--muted)]">
        Removes segments whose two endpoints both fall inside the Y range.
      </p>
    </form>
  }
  <p class="mx-2.5 mb-1 text-[0.72rem] text-[var(--muted)]">Road Y range: 0 &#8594; {{ roadMaxY }}</p>
  <div class="flex flex-wrap gap-1.5 px-2.5 pb-3 pt-2">
    <button type="button" mat-raised-button color="primary" class="!h-[30px] !text-[0.78rem]" (click)="onGenerate()" [disabled]="workerBusy">
      <mat-icon class="!text-[15px]">{{ markingTab === 'remove' ? 'delete' : 'add' }}</mat-icon>
      {{ markingTab === 'remove' ? 'Remove' : 'Generate' }}
    </button>
  </div>
</div>
