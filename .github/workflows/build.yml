name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write    # needed to create releases
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================================
  # Linux native build (SDL2)
  # ============================================================
  build-linux:
    if: false
    name: Build on Linux (SDL2)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake gcc libsdl2-dev

      - name: Configure CMake (SDL2 backend, Release)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPORT_SDL2=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Check binary exists
        run: |
          test -f build/reckless_drivin && echo "Build succeeded: $(file build/reckless_drivin)"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: reckless-drivin-linux
          path: build/reckless_drivin
          if-no-files-found: error

  # ============================================================
  # macOS native build (SDL2 via Homebrew)
  # ============================================================
  build-macos:
    if: false
    name: Build on macOS (SDL2)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SDL2
        run: brew install sdl2

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DPORT_SDL2=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Check binary exists
        run: test -f build/reckless_drivin && echo "Build succeeded"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: reckless-drivin-macos
          path: build/reckless_drivin
          if-no-files-found: error

  # ============================================================
  # Windows native build (SDL2 via vcpkg)
  # ============================================================
  build-windows:
    if: false
    name: Build on Windows (SDL2)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SDL2 via vcpkg
        run: |
          vcpkg install sdl2:x64-windows
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DPORT_SDL2=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Check binary exists
        run: Test-Path build\Release\reckless_drivin.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: reckless-drivin-windows
          path: build/Release/reckless_drivin.exe
          if-no-files-found: error

  # ============================================================
  # WebAssembly build using Emscripten
  # ============================================================
  build-wasm:
    name: Build WebAssembly (Emscripten)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js (for Angular build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: port/angular-site/package-lock.json

      - name: Install Angular dependencies
        run: npm ci --prefix port/angular-site

      - name: Build Angular site
        env:
          NG_CLI_ANALYTICS: "disable"
        run: |
          cd port/angular-site
          # ensure analytics prompt doesn't block in CI
          npx ng analytics disable || true
          npx ng build --configuration=production --base-href=/RecklessDrivinPort/
          echo "Angular build output:"
          ls -lh dist/reckless-drivin/

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.55
          actions-cache-folder: 'emsdk-cache'

      - name: Verify Emscripten
        run: emcc --version

      - name: Configure CMake for WASM
        run: |
          emcmake cmake -B build_wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DPORT_SDL2=ON

      - name: Build WASM
        run: cmake --build build_wasm --parallel

      - name: List WASM outputs
        run: ls -lh build_wasm/

      - name: Prepare GitHub Pages content (Angular + WASM)
        run: |
          mkdir -p gh-pages
          # Copy WASM game files (they go at the repo root so the Angular
          # app can fetch them at /RecklessDrivinPort/reckless_drivin.js etc.)
          cp build_wasm/reckless_drivin.js   gh-pages/
          cp build_wasm/reckless_drivin.wasm gh-pages/
          cp build_wasm/reckless_drivin.data gh-pages/
          # Copy Angular pre-built static files (output directory from ng build)
          ANGULAR_DIST="port/angular-site/dist/reckless-drivin"
          if [ -d "$ANGULAR_DIST" ]; then
            cp -r "$ANGULAR_DIST"/. gh-pages/
            echo "Deployed Angular site from $ANGULAR_DIST"
          else
            echo "::error::Angular build output not found at $ANGULAR_DIST"
            exit 1
          fi
          echo "Pages content:"
          ls -lh gh-pages/


      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: reckless-drivin-wasm
          path: gh-pages/
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  # ============================================================
  # Deploy to GitHub Pages (push to main/master only)
  # ============================================================
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-wasm
    runs-on: ubuntu-latest
    # only run on the default branch so we don't publish preview builds
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    # the `github-pages` environment can require manual approval, which
    # will block the job and make deploys appear to hang.  Remove the
    # environment or clear any protection rules in the repository settings
    # if you want automatic publishing.  (We keep the URL output logic for
    # now, but you can drop the whole `environment` block if you prefer.)
    # environment:
    #   name: github-pages
    #   url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================
  # Android APK build with on-screen touch controls
  # ============================================================
  build-android:
    if: false
    name: Build Android APK (SDL2 + touch controls)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Install Android NDK and build tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.2.9519653" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Download SDL2 source
        run: |
          SDL2_VERSION=2.28.5
          wget -q "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.tar.gz"
          tar xzf "SDL2-${SDL2_VERSION}.tar.gz"
          echo "SDL2_SOURCE_DIR=$PWD/SDL2-${SDL2_VERSION}" >> $GITHUB_ENV

      - name: Copy resources.dat to Android assets
        run: |
          mkdir -p port/android/app/src/main/assets
          cp port/resources/resources.dat port/android/app/src/main/assets/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Android APK (debug)
        working-directory: port/android
        run: |
          gradle assembleDebug \
            -PSDL2_SOURCE_DIR="$SDL2_SOURCE_DIR" \
            --no-daemon \
            --stacktrace

      - name: Verify APK was produced
        run: |
          APK=$(find port/android/app/build/outputs/apk -name "*.apk" | head -1)
          test -n "$APK" && echo "APK: $APK ($(du -sh $APK | cut -f1))" || (echo "APK not found!" && exit 1)

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: reckless-drivin-android
          path: port/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # ============================================================
  # Create GitHub Release on push to main/master
  # ============================================================
  release:
    if: false
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: reckless-drivin-linux
          path: release/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: reckless-drivin-macos
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: reckless-drivin-windows
          path: release/windows

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: reckless-drivin-android
          path: release/android

      - name: Prepare release assets
        run: |
          cp port/resources/resources.dat release/resources.dat
          cp port/resources/resources.dat release/linux/resources.dat
          cp port/resources/resources.dat release/macos/resources.dat
          cp port/resources/resources.dat release/windows/resources.dat
          cp release/resources.dat release/android/resources.dat
          chmod +x release/linux/reckless_drivin
          chmod +x release/macos/reckless_drivin
          (cd release/linux   && zip -9 ../reckless-drivin-linux.zip reckless_drivin resources.dat)
          (cd release/macos   && zip -9 ../reckless-drivin-macos.zip reckless_drivin resources.dat)
          (cd release/windows && zip -9 ../reckless-drivin-windows.zip reckless_drivin.exe resources.dat)
          (cd release/android && zip -9 ../reckless-drivin-android.zip app-debug.apk resources.dat)

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Reckless Drivin' – Latest Build"
          body: |
            Automated build from `${{ github.ref_name }}` @ `${{ github.sha }}`.

            Each desktop zip already includes both the game binary and
            `resources.dat` required to run the game.
          prerelease: false
          files: |
            release/reckless-drivin-linux.zip
            release/reckless-drivin-macos.zip
            release/reckless-drivin-windows.zip
            release/reckless-drivin-android.zip
            release/android/app-debug.apk
            release/resources.dat
